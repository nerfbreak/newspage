services:
  - type: web
    name: automation-worker
    env: python
    rootDir: worker
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: python worker_skeleton.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: WORKER_SHARED_SECRET
        sync: false
